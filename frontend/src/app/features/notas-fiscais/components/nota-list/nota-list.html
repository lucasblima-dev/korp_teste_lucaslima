<div class="page-container fade-in">

  <div class="page-header">
    <div>
      <h1 class="page-title">Notas Fiscais</h1>
      <p class="page-subtitle">Histórico e emissão de notas de saída</p>
    </div>
    <a routerLink="/notas/nova" class="btn btn-primary shadow-sm hover:shadow-md transition-shadow">
      <mat-icon>add_receipt</mat-icon> Emitir Nota
    </a>
  </div>

  <div class="card">
    <div class="table-wrapper">
      <table mat-table [dataSource]="notas()" class="w-full">

        <ng-container matColumnDef="numero">
          <th mat-header-cell *matHeaderCellDef> Número </th>
          <td mat-cell *matCellDef="let n" class="font-mono font-bold text-primary"> #{{n.numero}} </td>
        </ng-container>

        <ng-container matColumnDef="data">
          <th mat-header-cell *matHeaderCellDef> Criação </th>
          <td mat-cell *matCellDef="let n" class="text-secondary"> {{n.criadaEm | date:'dd/MM/yyyy HH:mm'}} </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef> Status </th>
          <td mat-cell *matCellDef="let n">
            <span class="badge" [ngClass]="{
                    'badge-blue': n.status === statusEnum.Aberta,
                    'badge-gray': n.status === statusEnum.Fechada
                  }">
              {{n.status === statusEnum.Aberta ? 'Em Aberto' : 'Fechada'}}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="acoes">
          <th mat-header-cell *matHeaderCellDef class="text-right"> Ações </th>
          <td mat-cell *matCellDef="let n" class="text-right">
            <button mat-icon-button class="action-btn text-gray-500 hover:text-primary hover:bg-primary-light"
              aria-label="Ver detalhes">
              <mat-icon>visibility</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="colunasExibidas"></tr>
        <tr mat-row *matRowDef="let row; columns: colunasExibidas;" class="table-row"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell text-center" colspan="4">
            <div class="empty-state">
              <mat-icon>receipt_long</mat-icon>
              <p>Nenhuma nota fiscal encontrada.</p>
            </div>
          </td>
        </tr>
      </table>
    </div>
  </div>

</div>
